<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>依頼フォーム作成ツール</title>
  <style>
    :root {
      --bg: #f7fbff;
      --panel: #ffffff;
      --main: #6ba8d8;
      --main-dark: #3f7fae;
      --sub: #eaf5ff;
      --text: #263544;
      --muted: #6f8190;
      --border: #cfe3f5;
      --danger: #f06f8f;
      --shadow: 0 18px 45px rgba(65, 118, 161, 0.16);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #dff2ff 0, transparent 34%),
        radial-gradient(circle at bottom right, #fff1f6 0, transparent 32%),
        var(--bg);
      color: var(--text);
    }

    .app {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
      letter-spacing: 0.08em;
      color: var(--main-dark);
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(8px);
    }

    .section {
      margin-bottom: 24px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    label,
    .label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      color: var(--main-dark);
      letter-spacing: 0.04em;
    }

    select,
    textarea,
    input[type="date"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: 0.18s ease;
    }

    select,
    input[type="date"] {
      height: 48px;
      padding: 0 14px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      padding: 14px 16px;
      line-height: 1.7;
    }

    select:focus,
    textarea:focus,
    input[type="date"]:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 4px rgba(107, 168, 216, 0.18);
    }

    .note {
      margin: 0 0 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--sub);
      color: #415a70;
      font-size: 13px;
      line-height: 1.75;
      border: 1px dashed #a7cdea;
    }

    .note p {
      margin: 0 0 6px;
    }

    .note p:last-child {
      margin-bottom: 0;
    }

    .date-grid {
      display: grid;
      gap: 12px;
    }

    .date-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      align-items: center;
    }

    .date-row span {
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .preview-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .preview-title h2 {
      margin: 0;
      font-size: 20px;
      color: var(--main-dark);
      letter-spacing: 0.06em;
    }

    .output {
      width: 100%;
      min-height: 420px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fdfefe;
      padding: 16px;
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 14px;
      color: var(--text);
      overflow: auto;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .copy-btn {
      background: linear-gradient(135deg, var(--main), #8bc5ed);
      color: #fff;
      box-shadow: 0 10px 20px rgba(107, 168, 216, 0.28);
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(107, 168, 216, 0.34);
    }

    .clear-btn {
      background: #f4f8fb;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .clear-btn:hover {
      background: #eef6fc;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(38, 53, 68, 0.92);
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: 0.24s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .app {
        width: min(100% - 20px, 1100px);
        padding: 22px 0;
      }

      .card {
        padding: 18px;
      }

      .date-row {
        grid-template-columns: 1fr;
      }

      .output {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>依頼フォーム作成ツール</h1>
      <p class="lead">入力内容から、依頼文としてそのまま貼り付けられるテキストを作成します。</p>
    </header>

    <main class="layout">
      <section class="card">
        <div class="section">
          <label for="requestType">【依頼したいもの】</label>
          <select id="requestType">
            <option value="">選択してください</option>
            <option value="Live２Ｄモデル">Live２Ｄモデル</option>
            <option value="一枚絵">一枚絵</option>
            <option value="ミニキャラ絵">ミニキャラ絵</option>
            <option value="立ち絵">立ち絵</option>
            <option value="ループアニメ">ループアニメ</option>
          </select>
        </div>

        <div class="section">
          <label for="designMaterial">【デザインの資料】</label>
          <div class="note">
            <p>※ビジュアルがすでにある方は、ラフではなく確定資料をご提出ください。（立ち絵や三面図など）</p>
            <p>※資料に３Ｄ画像の提出はご遠慮ください。（環境光によって正しい色がわからないため）</p>
            <p>※デザイン希望の方は、イメージに近い衣装の写真や既存の作品のキャラクターの画像などをお送りください。</p>
            <p>※ギガファイル便をご利用の方は、ＤＬ期限を１００日に設定してください。</p>
          </div>
          <textarea id="designMaterial" placeholder="資料URLや補足を入力してください"></textarea>
        </div>

        <div class="section">
          <label for="requestDetail">【要望】</label>
          <div class="note">
            <p>※ポーズや表情などなるべく具体的に。お任せの場合はその旨をお伝えください。</p>
          </div>
          <textarea id="requestDetail" placeholder="ポーズ・表情・雰囲気・お任せ範囲などを入力してください"></textarea>
        </div>

        <div class="section">
          <div class="label">【希望納期】</div>
          <div class="date-grid">
            <label class="date-row">
              <span>第１希望</span>
              <input type="date" id="date1">
            </label>
            <label class="date-row">
              <span>第２希望</span>
              <input type="date" id="date2">
            </label>
            <label class="date-row">
              <span>第３希望</span>
              <input type="date" id="date3">
            </label>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="preview-title">
          <h2>コピー用テキスト</h2>
        </div>

        <div id="output" class="output" aria-live="polite"></div>

        <div class="buttons">
          <button type="button" class="copy-btn" id="copyBtn">コピーする</button>
          <button type="button" class="clear-btn" id="clearBtn">入力をリセット</button>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">コピーしました</div>

  <script>
    const requestType = document.getElementById("requestType");
    const designMaterial = document.getElementById("designMaterial");
    const requestDetail = document.getElementById("requestDetail");
    const date1 = document.getElementById("date1");
    const date2 = document.getElementById("date2");
    const date3 = document.getElementById("date3");
    const output = document.getElementById("output");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const toast = document.getElementById("toast");

    const fields = [
      requestType,
      designMaterial,
      requestDetail,
      date1,
      date2,
      date3
    ];

    function formatDate(value) {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      return `${year}/${month}/${day}`;
    }

    function buildText() {
      return `【依頼したいもの】
${requestType.value}

【デザイン資料】
${designMaterial.value.trim()}

【要望】
${requestDetail.value.trim()}

【希望納期】
第１希望：${formatDate(date1.value)}
第２希望：${formatDate(date2.value)}
第３希望：${formatDate(date3.value)}`;
    }

    function updateOutput() {
      output.textContent = buildText();
    }

    async function copyText() {
      const text = buildText();

      try {
        await navigator.clipboard.writeText(text);
        showToast("コピーしました");
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();

        try {
          document.execCommand("copy");
          showToast("コピーしました");
        } catch (fallbackError) {
          showToast("コピーに失敗しました");
        }

        document.body.removeChild(textarea);
      }
    }

    function clearForm() {
      fields.forEach(field => {
        field.value = "";
      });
      updateOutput();
      showToast("リセットしました");
    }

    let toastTimer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    fields.forEach(field => {
      field.addEventListener("input", updateOutput);
      field.addEventListener("change", updateOutput);
    });

    copyBtn.addEventListener("click", copyText);
    clearBtn.addEventListener("click", clearForm);

    updateOutput();
  </script>
</body>
</html>
